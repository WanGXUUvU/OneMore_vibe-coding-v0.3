# Grader Schema
# 定义评估维度和通用 grader 接口
# 项目可自定义维度和权重

# --- 评估维度 ---
dimensions:
  correctness:
    description: "功能正确性：是否满足 Done when 中的 assert 条件"
    weight: 0.4
    grader_type: "auto"  # auto = 由你的执行器自动判定
  style:
    description: "代码风格/规范：lint 和 typecheck 是否通过"
    weight: 0.2
    grader_type: "auto"
  perf:
    description: "性能指标：构建时间、响应时间等是否在阈值内"
    weight: 0.2
    grader_type: "auto"  # timeout-based or benchmark
  security:
    description: "安全性：是否存在已知漏洞模式"
    weight: 0.1
    grader_type: "auto"  # 可由 npm audit / bandit 等工具驱动
  ux:
    description: "用户体验：截图/视觉一致性（通常需要人工）"
    weight: 0.1
    grader_type: "manual"  # 需要人工审查

# --- Grader 接口约定 ---
# 每个 grader 是一个可执行命令，接收以下环境变量：
#   EVAL_TASK       — eval yaml 文件路径
#   EVAL_TRIAL      — 当前 trial 名称
#   EVAL_ARTIFACT   — artifacts/<run_id>/ 目录路径
#   EVAL_DIMENSION  — 评估维度名称
#
# 退出码：
#   0 = pass
#   1 = fail
#   2 = error（执行异常）
#   3 = skip（本次跳过）
#
# stdout 写入 grader 的判断理由（截取前 2000 字符记录到 JSONL）

# --- 聚合指标 ---
metrics:
  pass_at_1:
    description: "单次运行通过率"
    formula: "pass_count / total_count"
  pass_at_k:
    description: "k 次运行中至少一次通过的概率"
    formula: "1 - (1 - pass_at_1)^k"
  regression_rate:
    description: "回归率：之前 pass 现在 fail 的比例"
    formula: "newly_failed / previously_passed"
