# Capability Eval 示例
# 验证新功能是否正确实现
# 参考：Anthropic "Demystifying evals for AI agents" (2026-01-09)

eval:
  name: "homepage-scaffold"
  type: capability         # capability | regression
  description: "验证首页脚手架是否正确搭建"
  related_task: TASK-001   # 关联的 TASK 卡（可选）

trials:
  - name: "index-html-exists"
    grader: correctness
    command: "test -f index.html"
    expected_exit: 0

  - name: "style-css-exists"
    grader: correctness
    command: "test -f style.css"
    expected_exit: 0

  - name: "build-succeeds"
    grader: correctness
    command: "npm run build"
    expected_exit: 0
    timeout_s: 60

  - name: "lint-clean"
    grader: style
    command: "npm run lint"
    expected_exit: 0

  - name: "build-under-30s"
    grader: perf
    command: "npm run build"
    expected_exit: 0
    timeout_s: 30

  - name: "no-console-errors"
    grader: correctness
    command: "! grep -rqiE 'console\\.error|throw new Error' src/ 2>/dev/null"
    expected_exit: 0

  - name: "homepage-screenshot"
    grader: ux
    type: manual
    description: "打开 http://localhost:3000 截图，确认布局与 SPEC 中的线框一致"
