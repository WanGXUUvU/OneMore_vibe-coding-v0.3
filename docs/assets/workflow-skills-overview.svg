<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F8FB"/>
      <stop offset="1" stop-color="#EEF3FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="140" y1="120" x2="1060" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5B8DEF"/>
      <stop offset="1" stop-color="#33C3A1"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="680" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="680" rx="28" fill="url(#bg)"/>
  <circle cx="1040" cy="96" r="120" fill="#DDE8FF"/>
  <circle cx="160" cy="588" r="110" fill="#DFF7F1"/>

  <g filter="url(#shadow)">
    <rect x="110" y="72" width="980" height="536" rx="28" fill="white"/>
  </g>

  <text x="140" y="132" fill="#162033" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">
    Agent Workflow Skills
  </text>
  <text x="140" y="168" fill="#536179" font-family="Arial, Helvetica, sans-serif" font-size="18">
    One workflow family. Four hosts. Full and lite variants.
  </text>

  <rect x="140" y="208" width="920" height="4" rx="2" fill="url(#accent)"/>

  <g>
    <rect x="150" y="246" width="410" height="134" rx="22" fill="#F8FBFF" stroke="#D9E6FF"/>
    <text x="182" y="290" fill="#1E2A42" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Full</text>
    <text x="182" y="325" fill="#536179" font-family="Arial, Helvetica, sans-serif" font-size="18">Structured delivery with docs, lanes,</text>
    <text x="182" y="351" fill="#536179" font-family="Arial, Helvetica, sans-serif" font-size="18">verification, review, and human gates.</text>
  </g>

  <g>
    <rect x="640" y="246" width="410" height="134" rx="22" fill="#F7FFFC" stroke="#D2F1E7"/>
    <text x="672" y="290" fill="#16342D" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Lite</text>
    <text x="672" y="325" fill="#536179" font-family="Arial, Helvetica, sans-serif" font-size="18">Same mental model, less overhead,</text>
    <text x="672" y="351" fill="#536179" font-family="Arial, Helvetica, sans-serif" font-size="18">fewer required docs, faster loops.</text>
  </g>

  <g>
    <rect x="150" y="430" width="190" height="110" rx="20" fill="#FFF8F0" stroke="#FFE1BC"/>
    <text x="182" y="474" fill="#7A4C00" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">Codex</text>
    <text x="182" y="505" fill="#8A6A35" font-family="Arial, Helvetica, sans-serif" font-size="16">full + lite</text>
  </g>

  <g>
    <rect x="370" y="430" width="190" height="110" rx="20" fill="#F8F5FF" stroke="#E1D6FF"/>
    <text x="402" y="474" fill="#4E3B8F" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">Claude</text>
    <text x="402" y="505" fill="#6D5AA7" font-family="Arial, Helvetica, sans-serif" font-size="16">full + lite</text>
  </g>

  <g>
    <rect x="590" y="430" width="190" height="110" rx="20" fill="#F3FAFF" stroke="#CFEAFF"/>
    <text x="622" y="474" fill="#0B5E8E" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">Copilot</text>
    <text x="622" y="505" fill="#497694" font-family="Arial, Helvetica, sans-serif" font-size="16">full + lite</text>
  </g>

  <g>
    <rect x="810" y="430" width="190" height="110" rx="20" fill="#F2FFF8" stroke="#CFF2DF"/>
    <text x="842" y="474" fill="#15603A" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">CodeBuddy</text>
    <text x="842" y="505" fill="#4E7C63" font-family="Arial, Helvetica, sans-serif" font-size="16">full + lite</text>
  </g>
</svg>
